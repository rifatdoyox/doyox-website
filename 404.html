<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service off – doyox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0b1a 0%, #1e1b2f 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(20, 18, 38, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 3rem;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            animation: borderGlow 5s infinite ease-in-out;
        }

        @keyframes borderGlow {
            0% { box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,107,157,0.4); }
            33% { box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 2px rgba(74,222,128,0.5); }
            66% { box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 2px rgba(192,132,252,0.5); }
            100% { box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,107,157,0.4); }
        }

        /* Emoji styling */
        .sorry-emoji {
            font-size: 6rem;
            display: inline-block;
            animation: floatEmoji 2s ease-in-out infinite;
            filter: drop-shadow(0 8px 20px rgba(255, 107, 157, 0.4));
        }

        @keyframes floatEmoji {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Big SORRY text */
        .sorry-big {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #4ade80);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-transform: uppercase;
            margin: 0.5rem 0 1rem;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f0f3fa, #cddcff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .subhead {
            color: #a5b4fc;
            font-size: 0.9rem;
            border-bottom: 1px dashed rgba(165, 180, 252, 0.4);
            display: inline-block;
            padding-bottom: 0.3rem;
            margin-bottom: 1.8rem;
        }

        .message {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            margin: 2rem 0;
            color: #e2e8ff;
            font-weight: 500;
            font-size: 1.1rem;
            border-left: 3px solid #4ade80;
            text-align: center;
        }

        .countdown {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 3rem;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            display: inline-flex;
            align-items: baseline;
            gap: 0.8rem;
            border: 1px solid rgba(192, 132, 252, 0.5);
        }

        .countdown-number {
            font-family: monospace;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b9d, #c084fc, #4ade80);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .countdown-label {
            color: #cbd5ff;
            font-size: 1rem;
        }

        .redirect-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(95deg, #ff6b9d, #c084fc);
            padding: 0.75rem 2rem;
            border-radius: 3rem;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(192, 132, 252, 0.4);
            margin-top: 0.5rem;
            border: none;
        }

        .redirect-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ff80ab, #d19cff);
        }

        .footnote {
            font-size: 0.75rem;
            color: #7e8aae;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Only emoji + big SORRY text -->
    <div class="sorry-emoji">😔</div>
    <div class="sorry-big">SORRY</div>

    <h2>Service temporarily off</h2>
    <div class="subhead">doyox · maintenance window</div>

    <div class="message">
        Be connected with doyox.<br>Thank you for your patience.
    </div>

    <!-- Countdown -->
    <div class="countdown">
        <span class="countdown-number" id="countdownTimer">10</span>
        <span class="countdown-label">seconds</span>
        <span style="color: #c084fc;">→</span>
    </div>

    <a href="/" class="redirect-btn">
        <span>Homepage</span>
    </a>
    <div class="footnote">
        Automatic redirect in <span id="footnoteSeconds" style="font-weight:bold; color:#ff9fbb;">10</span> seconds
    </div>
</div>

<script>
    let seconds = 10;
    const timerEl = document.getElementById('countdownTimer');
    const footEl = document.getElementById('footnoteSeconds');

    function update() {
        timerEl.innerText = seconds;
        footEl.innerText = seconds;
        if (seconds === 0) {
            window.location.href = '/';
        } else {
            seconds--;
            setTimeout(update, 1000);
        }
    }
    update();
</script>
</body>
</html>
