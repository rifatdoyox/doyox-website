<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service temporarily unavailable – doyox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2.5rem 2rem;
            text-align: center;
            border: 1px solid #eef2f6;
        }

        /* Professional "Sorry" animation */
        .sorry-container {
            margin-bottom: 1.8rem;
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .sorry-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #fff1f0;
            padding: 0.5rem 1.2rem 0.5rem 1rem;
            border-radius: 40px;
            border-left: 3px solid #dc2626;
            animation: gentlePulse 2s infinite ease-in-out;
        }

        .sorry-icon {
            width: 20px;
            height: 20px;
            stroke: #b91c1c;
            stroke-width: 1.8;
            fill: none;
        }

        .sorry-text {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            color: #991b1b;
            text-transform: uppercase;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gentlePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.2);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(220, 38, 38, 0.08);
                transform: scale(1.01);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
                transform: scale(1);
            }
        }

        /* Icon styles */
        .icon-circle {
            background: #f1f5f9;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
        }

        .icon-svg {
            width: 34px;
            height: 34px;
            stroke: #1e293b;
            stroke-width: 1.5;
            fill: none;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
        }

        .subhead {
            color: #475569;
            font-size: 0.9rem;
            border-bottom: 1px solid #e2e8f0;
            display: inline-block;
            padding-bottom: 0.25rem;
            margin-bottom: 1.5rem;
        }

        .message {
            background: #fef9e3;
            padding: 1rem 1.25rem;
            border-radius: 1.2rem;
            color: #92400e;
            font-weight: 500;
            margin: 1.5rem 0;
            font-size: 1rem;
            border-left: 4px solid #f59e0b;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .message-icon {
            flex-shrink: 0;
        }

        .countdown-panel {
            background: #f1f5f9;
            border-radius: 2rem;
            padding: 1.25rem;
            margin: 1.8rem 0;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            font-weight: 500;
        }

        .countdown-number {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f172a, #334155);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .countdown-unit {
            font-size: 1.1rem;
            color: #334155;
        }

        .redirect-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #0f172a;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.8rem;
            border-radius: 2rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #1e293b;
            margin-top: 0.5rem;
        }

        .redirect-button:hover {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .footnote {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Animated "Sorry" badge (professional, no emoji) -->
    <div class="sorry-container">
        <div class="sorry-badge">
            <svg class="sorry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span class="sorry-text">Sorry</span>
        </div>
    </div>

    <!-- Main icon -->
    <div class="icon-circle">
        <svg class="icon-svg" viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <line x1="8" y1="12" x2="16" y2="12" />
            <line x1="12" y1="8" x2="12" y2="16" />
        </svg>
    </div>

    <h1>Service temporarily off</h1>
    <div class="subhead">doyox · maintenance window</div>

    <!-- Icon message (no emojis) -->
    <div class="message">
        <span class="message-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#92400e" stroke-width="2">
                <path d="M20 12v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-4M12 2v8M9 7l3 3 3-3" />
            </svg>
        </span>
        <span>Be connected with doyox. Thank you for your patience.</span>
    </div>

    <!-- Countdown block -->
    <div class="countdown-panel">
        <span class="countdown-number" id="countdownSeconds">10</span>
        <span class="countdown-unit">seconds</span>
        <span style="color:#64748b;">until redirect</span>
    </div>

    <a href="/" class="redirect-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12" />
            <polyline points="12 5 19 12 12 19" />
        </svg>
        Go to homepage now
    </a>
    <div class="footnote">
        Automatic redirect in <span id="footnoteSeconds">10</span> seconds
    </div>
</div>

<script>
    (function() {
        let seconds = 10;
        const countEl = document.getElementById('countdownSeconds');
        const footnoteSec = document.getElementById('footnoteSeconds');
        const redirectUrl = '/';   // redirects to doyox.com homepage

        function updateDisplay() {
            if (countEl) countEl.innerText = seconds;
            if (footnoteSec) footnoteSec.innerText = seconds;
        }

        function redirect() {
            window.location.href = redirectUrl;
        }

        const timer = setInterval(() => {
            if (seconds <= 1) {
                clearInterval(timer);
                redirect();
            } else {
                seconds--;
                updateDisplay();
            }
        }, 1000);

        // Fallback safety
        setTimeout(() => {
            if (seconds > 0) {
                clearInterval(timer);
                redirect();
            }
        }, 11000);

        updateDisplay();
    })();
</script>
</body>
  </html>
